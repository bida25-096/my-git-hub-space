<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      padding: 50px;
    }

    .thankyou-box {
      background: #ffffff;
      border: 2px solid #27ae60;
      border-radius: 8px;
      padding: 40px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #27ae60;
    }

    p {
      font-size: 18px;
      margin: 20px 0;
    }

    .ok-btn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;

 text-decoration: none;
    }

    .ok-btn:hover {
      background: #219150;
    }
  </style>

</head>

<body>

  <div class="thankyou-box">

    <h1>🎉Thank You for registering and choosing fitness!</h1>

    <p>Your registration for the Sponsored Walk has been received and we will send a confirmation to your email before the event.</p>

    <a href="index.html" class="ok-btn">OK</a>

  </div>

</body>

</html>
